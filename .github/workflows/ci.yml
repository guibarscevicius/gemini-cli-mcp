name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # ready_for_review ensures CI runs when a draft PR is marked ready.
    # synchronize/reopened only run jobs when draft == false (see job condition).
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  build:
    name: Build & Lint & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    # Skip draft PRs. Also passes for direct pushes to main (no PR context).
    if: github.event_name == 'push' || github.event.pull_request.draft == false

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
