# the name by which the project can be referenced within Serena
project_name: "gemini-cli-mcp"

# Language servers to start. Use "typescript" for JavaScript too.
languages:
- typescript

# the encoding used by text files in the project
# For a list of possible encodings, see https://docs.python.org/3.11/library/codecs.html#standard-encodings
encoding: "utf-8"

# If unset, falls back to global serena_config.yml setting (LSP or JetBrains).
language_backend:

# Honour project .gitignore when indexing files.
ignore_all_files_in_gitignore: true

# Additional paths to ignore beyond .gitignore.
ignored_paths: []

# whether the project is in read-only mode
# If set to true, all editing tools will be disabled and attempts to use them will result in an error
# Added on 2025-04-18
read_only: false

# Tool names to disable (empty = all tools enabled).
excluded_tools: []

# list of tools to include that would otherwise be disabled (particularly optional tools that are disabled by default)
included_optional_tools: []

# Non-empty list replaces Serena's default tool set entirely.
fixed_tools: []

# Modes always active for this project (overrides global base_modes if set).
base_modes:

# Modes active by default (overrides global default_modes if set).
default_modes:

# Shown to the LLM every time the project is activated.
initial_prompt: |
  TypeScript MCP server wrapping @google/gemini-cli. Exposes two tools:
  ask-gemini (start session) and gemini-reply (continue session).
  Key source files:
    src/gemini-runner.ts  — subprocess execution and JSON output parsing
    src/tools/ask-gemini.ts, src/tools/gemini-reply.ts — MCP tool handlers
    src/session-store.ts  — in-process multi-turn session management
    src/dispatcher.ts     — routes MCP tool calls + error handling
  Tests: vitest (npm test). Build: tsc (npm run build).
# Seconds per tool call for symbol info retrieval. Null = global default.
symbol_info_budget:

# list of regex patterns which, when matched, mark a memory entry as read‑only.
# Extends the list from the global configuration, merging the two lists.
read_only_memory_patterns: []
